<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buri Pagol Gaming</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a,#020617);
  color:white;
}
header{
  text-align:center;
  padding:60px 20px;
  background:radial-gradient(circle at center,#1f2937,#020617);
  border-bottom:2px solid #22c55e;
}

h1{
  font-size:56px;
  letter-spacing:4px;
  color:#22c55e;
  text-shadow:0 0 15px #22c55e;
  margin:0;
}

.subtitle{
  opacity:.8;
  margin-top:10px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.nav a{
  text-decoration:none;
  color:white;
  padding:10px 20px;
  border:1px solid #22c55e;
  border-radius:8px;
  transition:.3s;
}

.nav a:hover{
  background:#22c55e;
  color:black;
  box-shadow:0 0 15px #22c55e;
}

section{
  padding:70px 20px;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  margin-top:40px;
}

.card{
  background:#111827;
  border:1px solid #22c55e33;
  padding:25px;
  border-radius:14px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 0 20px #22c55e66;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 28px;
  border-radius:10px;
  background:#22c55e;
  color:black;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.btn:hover{
  box-shadow:0 0 18px #22c55e;
}

footer{
  text-align:center;
  padding:30px;
  background:#020617;
  border-top:1px solid #22c55e22;
  opacity:.7;
}
</style>
</head>

<body>

<header>
<h1>BURI PAGOL</h1>
<p class="subtitle">Gaming • Roblox • Fun Community</p>

<div class="nav">
<a href="#about">About</a>
<a href="#games">Games</a>
<a href="#community">Community</a>
<a href="#contact">Contact</a>
</div>

</header>

<section id="about">
<h2>About Buri Pagol</h2>
<p>Welcome to the Buri Pagol gaming website. This is the home of Roblox games, crazy fun content, and an awesome gaming community.</p>
<a class="btn" href="#games">Play Games</a>
</section>

<section id="games">
<h2>Featured Games</h2>

<div class="card-grid">

<div class="card">
<h3>Roblox Game</h3>
<p>Play our latest Roblox adventure game.</p>
</div>

<div class="card">
<h3>New Updates</h3>
<p>Check out the newest updates and features.</p>
</div>

<div class="card">
<h3>Leaderboards</h3>
<p>See the best players in the community.</p>
</div>

</div>
</section>

<section id="community">
<h2>Join the Community</h2>
<p>Join our gaming community and play with friends.</p>
<a class="btn" href="#">Join Now</a>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Email: buripagol@email.com</p>
</section>

<footer>
<p>© 2026 Buri Pagol Gaming</p>
</footer>

</body>
</html>
